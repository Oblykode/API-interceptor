<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Interceptor</title>
    <style>
        :root {
            --bg: #121417;
            --panel: #1c2128;
            --panel-2: #242c36;
            --border: #3a4553;
            --text: #e8edf2;
            --muted: #9fb0c2;
            --accent: #13b8a6;
            --danger: #e24f6b;
        }

        body.light {
            --bg: #f2f5f8;
            --panel: #ffffff;
            --panel-2: #eef3f8;
            --border: #d6dfe9;
            --text: #1e2936;
            --muted: #526476;
            --accent: #0a8f7f;
            --danger: #cb3855;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: radial-gradient(circle at top right, #203140 0%, var(--bg) 45%);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            grid-template-rows: 68px 1fr;
            height: 100vh;
        }

        .topbar {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--danger);
        }

        .status-dot.connected {
            background: var(--accent);
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        button, input, select {
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--text);
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 12px;
        }

        button {
            cursor: pointer;
        }

        button.primary {
            border-color: transparent;
            background: var(--accent);
            color: #031614;
            font-weight: 700;
        }

        button.danger {
            background: var(--danger);
            border-color: transparent;
            color: #fff;
        }

        .sidebar {
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .filter-bar {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: grid;
            gap: 8px;
        }

        .queue-box {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            color: var(--muted);
        }

        .flow-list {
            overflow-y: auto;
            padding: 10px;
            display: grid;
            gap: 8px;
        }

        .flow-item {
            background: var(--panel-2);
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        .flow-item.active {
            border-color: var(--accent);
        }

        .flow-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .method {
            font-weight: 700;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 999px;
            background: #334154;
        }

        .badge {
            font-size: 11px;
            color: var(--muted);
        }

        .flow-url {
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
            word-break: break-all;
        }

        .content {
            display: grid;
            grid-template-rows: 42px 1fr;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            align-items: center;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 0 10px;
            gap: 6px;
        }

        .tab {
            border: none;
            background: transparent;
            color: var(--muted);
            border-bottom: 2px solid transparent;
            border-radius: 0;
            padding: 10px 12px;
        }

        .tab.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }

        .panel {
            padding: 14px;
            overflow: auto;
            display: none;
        }

        .panel.active {
            display: block;
        }

        .block {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .block h3 {
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--muted);
        }

        pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 12px;
            line-height: 1.4;
            color: var(--text);
        }

        textarea {
            width: 100%;
            min-height: 150px;
            resize: vertical;
            font-size: 12px;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .message {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            color: #ffd699;
            background: #4a3520;
            display: none;
        }

        @media (max-width: 1000px) {
            .layout {
                grid-template-columns: 1fr;
                grid-template-rows: 68px 280px 1fr;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }
    </style>
</head>
<body class="dark">
    <div class="layout">
        <header class="topbar">
            <div class="brand">
                <div id="statusDot" class="status-dot"></div>
                <span>API Interceptor</span>
                <small id="statusText">disconnected</small>
            </div>
            <div class="controls">
                <label><input id="interceptEnabled" type="checkbox" checked> Intercept</label>
                <label><input id="prettyJson" type="checkbox" checked> Pretty JSON</label>
                <button id="themeToggle">Light</button>
                <button id="exportSelected">Export Selected</button>
                <button id="clearAll" class="danger">Clear</button>
            </div>
        </header>

        <aside class="sidebar">
            <div id="errorMessage" class="message"></div>
            <div class="filter-bar">
                <input id="searchInput" placeholder="Search URL or body">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <select id="methodFilter">
                        <option value="">All methods</option>
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="PATCH">PATCH</option>
                        <option value="DELETE">DELETE</option>
                    </select>
                    <select id="statusFilter">
                        <option value="">All states</option>
                        <option value="pending_request">pending_request</option>
                        <option value="pending_response">pending_response</option>
                        <option value="completed">completed</option>
                        <option value="dropped">dropped</option>
                    </select>
                </div>
            </div>
            <div class="queue-box">
                <div>Active Queue Head: <span id="queueHead">none</span></div>
                <div>Pending: <span id="queueCount">0</span></div>
            </div>
            <div id="flowList" class="flow-list"></div>
        </aside>

        <main class="content">
            <nav class="tabs">
                <button class="tab active" data-tab="request">Request</button>
                <button class="tab" data-tab="response">Response</button>
                <button class="tab" data-tab="headers">Headers</button>
                <button class="tab" data-tab="modify">Modify</button>
            </nav>
            <section id="requestPanel" class="panel active"></section>
            <section id="responsePanel" class="panel"></section>
            <section id="headersPanel" class="panel"></section>
            <section id="modifyPanel" class="panel"></section>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
